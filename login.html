<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Project Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card login-card shadow p-4">
      <h3 class="text-center mb-2">Project Submission Portal</h3>
      <p class="text-center text-muted small mb-3">Login as Student / Faculty / Admin</p>
      <form id="loginForm" class="needs-validation" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input id="email" type="email" class="form-control" placeholder="you@example.com" required>
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="form-control" placeholder="Password" required>
          <div class="invalid-feedback">Please enter your password.</div>
        </div>

        <div class="mb-3">
          <label for="role" class="form-label">Role</label>
          <select id="role" class="form-select" required>
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>

      <p class="mt-3 text-center text-muted small">This is a front-end prototype — actions are demo-only.</p>
    </div>
  </div>

  <script src="assets/js/script.js"></script>

</body>
</html>
