<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Review Submission</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container-fluid">
<a class="navbar-brand" href="faculty-dashboard.html">Project Portal</a>
</div>
</nav>
<div class="container py-4">
<div class="card mx-auto" style="max-width:900px;">
<div class="card-body">
<h5 class="card-title">Review: John Doe (20XX1234)</h5>
<p><strong>Uploaded File:</strong> <a href="#" id="fileLink">project_report.pdf</a></p>
<form id="reviewForm">
<div class="mb-3">
<label class="form-label">Status</label>
<select id="reviewStatus" class="form-select">
<option value="Approved">Approved</option>
<option value="Revision Needed">Revision Needed</option>
</select>
</div>
<div class="mb-3">
<label class="form-label">Comments</label>
<textarea id="reviewComments" class="form-control" rows="4"></textarea>
</div>
<button class="btn btn-primary" type="submit">Submit Review</button>
</form>
<div id="reviewMessage" class="mt-3"></div>
</div>
</div>
</div>
<script src="assets/js/script.js"></script>
</body>
</html>
