<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Upload Project</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container-fluid">
<a class="navbar-brand" href="student-dashboard.html">Project Portal</a>
<div class="collapse navbar-collapse">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="student-dashboard.html">Dashboard</a></li>
</ul>
</div>
</div>
</nav>


<div class="container py-4">
<div class="card mx-auto" style="max-width:720px;">
<div class="card-body">
<h5 class="card-title">Upload Project Documents</h5>
<form id="uploadForm">
<div class="mb-3">
<label class="form-label">Document Title</label>
<input type="text" class="form-control" id="docTitle" placeholder="Project Report, Synopsis, PPT">
</div>
<div class="mb-3">
<label class="form-label">Choose File</label>
<input type="file" class="form-control" id="docFile">
</div>
<div class="mb-3 form-check">
<input type="checkbox" class="form-check-input" id="confirm">
<label class="form-check-label" for="confirm">I confirm this is my original work</label>
</div>
<button class="btn btn-success" type="submit">Upload</button>
</form>
<div id="uploadMessage" class="mt-3"></div>
</div>
</div>
</div>


<script src="assets/js/script.js"></script>
</body>
</html>
